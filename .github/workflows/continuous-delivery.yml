name: Continuous Delivery / Binaries

permissions:
  contents: write

on:
  release:
    types: [published]
  pull_request:
    branches: [main]

concurrency:
  group: continuous-delivery-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/main' }}

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings
  RUSTUP_MAX_RETRIES: 10
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache

defaults:
  run:
    shell: bash

jobs:
  upload-assets:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04-arm
          # - target: aarch64-apple-darwin
          #   os: macos-12
          # - target: aarch64-pc-windows-msvc
          #   os: windows-2022
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04

          - target: x86_64-pc-windows-msvc
            os: windows-2025
          # - target: x86_64-apple-darwin
          #   os: macos-latest
          # - target: x86_64-pc-windows-msvc
          #   os: windows-2022
          # - target: x86_64-unknown-freebsd
          #   os: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # - name: Install dependencies on Linux
      #   if: contains(matrix.os, 'freebsd')
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y libpq-dev libsqlite3-dev

      # - name: Install dependencies on macOS
      #   if: startsWith(matrix.os, 'macos')
      #   run: |
      #     brew update
      #     brew install libpq sqlite3

      # - name: Install dependencies on Windows
      #   if: startsWith(matrix.os, 'windows')
      #   run: |
      #     choco install postgresql libsqlite3

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cargo Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-release-${{ matrix.target }}-full-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-${{ matrix.target }}-full-

      - name: Install Rust toolchain
        uses: taiki-e/github-actions/install-rust@main
        with:
          toolchain: stable
          component: rustfmt,clippy
          target: ${{ matrix.target }}

      - uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      # taiki-e musl toolchain ships GCC 9; mysqlclient-src (MySQL 9.5) checks for GCC 11+
      # Bypass the cmake version check and ensure cmake uses the musl cross-compiler
      # (CMAKE_TOOLCHAIN_FILE causes the cmake crate to skip its CC/CXX detection)
      - name: Bypass MySQL GCC version check
        if: contains(matrix.target, '-musl')
        run: |
          TARGET_US=$(echo "${{ matrix.target }}" | tr '-' '_')
          MUSL_CC=$(eval echo "\${CC_${TARGET_US}:-\${CC:-cc}}")
          MUSL_CXX=$(eval echo "\${CXX_${TARGET_US}:-\${CXX:-c++}}")
          sudo apt-get install -y libncurses-dev >/dev/null 2>&1
          NCURSES_LIB=$(find /usr/lib* /lib* -name 'libncurses.a' -o -name 'libncurses.so' 2>/dev/null | head -1)
          NCURSES_INC=$(dirname "$(find /usr/include -name 'curses.h' 2>/dev/null | head -1)")
          # musl has resolver functions in libc; create stub so cmake finds "libresolv"
          mkdir -p /tmp/musl-stubs
          "${MUSL_CC}" -x c -c -o /tmp/musl-stubs/empty.o /dev/null
          ar rcs /tmp/musl-stubs/libresolv.a /tmp/musl-stubs/empty.o
          printf 'set(FORCE_UNSUPPORTED_COMPILER ON CACHE BOOL "" FORCE)\n' > /tmp/force-gcc.cmake
          printf 'set(CMAKE_C_COMPILER "%s" CACHE FILEPATH "" FORCE)\n' "${MUSL_CC}" >> /tmp/force-gcc.cmake
          printf 'set(CURSES_LIBRARY "%s" CACHE FILEPATH "" FORCE)\n' "${NCURSES_LIB}" >> /tmp/force-gcc.cmake
          printf 'set(CURSES_INCLUDE_PATH "%s" CACHE PATH "" FORCE)\n' "${NCURSES_INC}" >> /tmp/force-gcc.cmake
          printf 'set(CURSES_NEED_NCURSES TRUE CACHE BOOL "" FORCE)\n' >> /tmp/force-gcc.cmake
          printf 'set(RESOLV_LIBRARY "/tmp/musl-stubs/libresolv.a" CACHE FILEPATH "" FORCE)\n' >> /tmp/force-gcc.cmake
          # GCC 9 doesn't recognize -std=c++20 (only -std=c++2a); wrapper translates the flag
          printf '#!/bin/bash\nargs=()\nfor arg in "$@"; do args+=("${arg//-std=c++20/-std=c++2a}"); done\nexec "%s" "${args[@]}"\n' "${MUSL_CXX}" > /tmp/musl-cxx-wrap
          chmod +x /tmp/musl-cxx-wrap
          printf 'set(CMAKE_CXX_COMPILER "/tmp/musl-cxx-wrap" CACHE FILEPATH "" FORCE)\n' >> /tmp/force-gcc.cmake
          # Build tools (uca9dump, comp_err) must be static to run on glibc host
          printf 'set(CMAKE_EXE_LINKER_FLAGS "-static" CACHE STRING "" FORCE)\n' >> /tmp/force-gcc.cmake
          echo "CMAKE_TOOLCHAIN_FILE=/tmp/force-gcc.cmake" >> "$GITHUB_ENV"
          echo "Generated /tmp/force-gcc.cmake:"
          cat /tmp/force-gcc.cmake

      - name: Use Strawberry Perl for OpenSSL build (Windows)
        if: runner.os == 'Windows'
        run: echo "OPENSSL_SRC_PERL=C:/Strawberry/perl/bin/perl" >> $GITHUB_ENV

      - uses: taiki-e/upload-rust-binary-action@main
        with:
          bin: autopulse
          target: ${{ matrix.target }}
          tar: all
          zip: windows
          features: vendored
          token: ${{ secrets.GITHUB_TOKEN }}
          dry-run: ${{ github.event_name == 'pull_request' }}